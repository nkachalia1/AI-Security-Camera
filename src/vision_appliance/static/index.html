<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Security Camera</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>AI Security Camera</h1>
        <p id="substatus">Starting camera pipeline</p>
      </div>
      <div class="actions">
        <button id="startBtn" type="button">Start</button>
        <button id="stopBtn" type="button">Stop</button>
        <button id="reportBtn" type="button">Generate report</button>
      </div>
    </header>

    <main class="layout">
      <section class="video-panel">
        <div class="panel-header">
          <h2>Live Feed</h2>
          <div class="metric-row">
            <span id="runningMetric" class="metric">Offline</span>
            <span id="fpsMetric" class="metric">0 fps</span>
            <span id="trackMetric" class="metric">0 tracks</span>
            <span id="tempMetric" class="metric">Temp --</span>
          </div>
        </div>
        <div class="video-frame">
          <img id="stream" alt="Annotated camera feed" src="/stream" />
        </div>
      </section>

      <aside class="side-panel">
        <section>
          <div class="panel-header compact">
            <h2>Objects</h2>
          </div>
          <div id="objects" class="object-list"></div>
        </section>

        <section>
          <div class="panel-header compact">
            <h2>Zones</h2>
          </div>
          <div id="zones" class="zone-list"></div>
        </section>
      </aside>

      <section class="events-panel">
        <div class="panel-header">
          <h2>Event Timeline</h2>
          <span id="eventCount" class="metric">0 events</span>
        </div>
        <div id="events" class="timeline"></div>
      </section>

      <section class="media-panel">
        <div class="panel-header">
          <h2>Evidence</h2>
        </div>
        <div class="media-columns">
          <div>
            <h3>Clips</h3>
            <div id="clips" class="media-list"></div>
          </div>
          <div>
            <h3>Reports</h3>
            <div id="reports" class="report-list"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
