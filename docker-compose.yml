services:
  vision-appliance:
    build: .
    image: ai-security-camera:local
    restart: unless-stopped
    devices:
      - /dev/video0:/dev/video0
    environment:
      VISION_CAMERA_INDEX: "0"
      VISION_FRAME_WIDTH: "1280"
      VISION_FRAME_HEIGHT: "720"
      VISION_FPS: "15"
      VISION_DATA_DIR: /data
      VISION_HOST: 0.0.0.0
      VISION_PORT: "8080"
    volumes:
      - ./data:/data
      - ./models:/app/models:ro
    ports:
      - "8080:8080"
